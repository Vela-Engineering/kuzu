name: Build and Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────
  # Python wheels
  # ──────────────────────────────────────────────────
  build-sdist:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Create source distribution
        working-directory: ./scripts/pip-package
        run: |
          mkdir -p wheelhouse
          python3 package_tar.py kuzu.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./scripts/pip-package/kuzu.tar.gz

  build-linux-x86-wheels:
    needs: build-sdist
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: ./scripts/pip-package

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: "cp311-manylinux_x86_64 cp312-manylinux_x86_64 cp313-manylinux_x86_64"
          CIBW_SKIP: "pp* *musllinux*"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_BEFORE_ALL: "yum install -y cmake ninja-build"
          CIBW_ENVIRONMENT: "NUM_THREADS=3"
          CIBW_BUILD_VERBOSITY: 1
        with:
          package-dir: ./scripts/pip-package/kuzu.tar.gz
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86-wheels
          path: wheelhouse/*.whl

  build-linux-arm64-wheels:
    needs: build-sdist
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: ./scripts/pip-package

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: "cp311-manylinux_aarch64 cp312-manylinux_aarch64 cp313-manylinux_aarch64"
          CIBW_SKIP: "pp* *musllinux*"
          CIBW_MANYLINUX_AARCH64_IMAGE: "manylinux_2_28"
          CIBW_ARCHS_LINUX: "aarch64"
          CIBW_BEFORE_ALL: "yum install -y cmake ninja-build"
          CIBW_ENVIRONMENT: "NUM_THREADS=4"
          CIBW_BUILD_VERBOSITY: 1
        with:
          package-dir: ./scripts/pip-package/kuzu.tar.gz
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-wheels
          path: wheelhouse/*.whl

  build-mac-wheels:
    needs: build-sdist
    runs-on: macos-14
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: ./scripts/pip-package

      - name: Pre-download virtualenv for cibuildwheel
        run: |
          CACHE_DIR="$HOME/Library/Caches/cibuildwheel"
          mkdir -p "$CACHE_DIR"
          for i in 1 2 3 4 5; do
            curl -fsSL -o "$CACHE_DIR/virtualenv-20.27.1.pyz" \
              "https://github.com/pypa/get-virtualenv/blob/20.27.1/public/virtualenv.pyz?raw=true" && break
            echo "Retry $i..."
            sleep $((i * 5))
          done

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: "cp311-macosx_arm64 cp312-macosx_arm64 cp313-macosx_arm64"
          CIBW_SKIP: "pp*"
          CIBW_ENVIRONMENT: "NUM_THREADS=3 MACOSX_DEPLOYMENT_TARGET=11.0"
          CIBW_BUILD_VERBOSITY: 1
        with:
          package-dir: ./scripts/pip-package/kuzu.tar.gz
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: mac-wheels
          path: wheelhouse/*.whl

  # ──────────────────────────────────────────────────
  # Node.js addon
  # ──────────────────────────────────────────────────
  build-nodejs-linux-x86:
    runs-on: ubuntu-24.04
    container: node:20-bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: apt-get update && apt-get install -y cmake ninja-build g++ make python3

      - name: Install Node.js API dependencies
        working-directory: tools/nodejs_api
        run: npm install --include=dev

      - name: Build Node.js addon
        env:
          LDFLAGS: "-static-libgcc -static-libstdc++"
        run: |
          export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          unset LD_LIBRARY_PATH LIBRARY_PATH CPATH C_INCLUDE_PATH CPLUS_INCLUDE_PATH PKG_CONFIG_PATH CC CXX
          make nodejs NUM_THREADS=$(nproc) EXTRA_CMAKE_FLAGS="-DCMAKE_SHARED_LINKER_FLAGS='-static-libgcc -static-libstdc++'"

      - name: Verify glibc compatibility
        run: |
          echo "=== GLIBC version requirements ==="
          readelf --version-info tools/nodejs_api/build/kuzujs.node | grep -A1 "GLIBC_" || true
          echo "=== Dynamic dependencies ==="
          readelf -d tools/nodejs_api/build/kuzujs.node | grep NEEDED || true
          echo "=== Container glibc version ==="
          ldd --version | head -1

      - name: Rename prebuilt binary
        run: |
          mkdir -p tools/nodejs_api/prebuilt
          cp tools/nodejs_api/build/kuzujs.node tools/nodejs_api/prebuilt/kuzujs-linux-x64.node

      - uses: actions/upload-artifact@v4
        with:
          name: nodejs-linux-x64
          path: tools/nodejs_api/prebuilt/kuzujs-linux-x64.node

  build-nodejs-linux-arm64:
    runs-on: ubuntu-24.04-arm
    container: node:20-bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: apt-get update && apt-get install -y cmake ninja-build g++ make python3

      - name: Install Node.js API dependencies
        working-directory: tools/nodejs_api
        run: npm install --include=dev

      - name: Build Node.js addon
        env:
          LDFLAGS: "-static-libgcc -static-libstdc++"
        run: |
          export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          unset LD_LIBRARY_PATH LIBRARY_PATH CPATH C_INCLUDE_PATH CPLUS_INCLUDE_PATH PKG_CONFIG_PATH CC CXX
          make nodejs NUM_THREADS=$(nproc) EXTRA_CMAKE_FLAGS="-DCMAKE_SHARED_LINKER_FLAGS='-static-libgcc -static-libstdc++'"

      - name: Verify glibc compatibility
        run: |
          echo "=== GLIBC version requirements ==="
          readelf --version-info tools/nodejs_api/build/kuzujs.node | grep -A1 "GLIBC_" || true
          echo "=== Dynamic dependencies ==="
          readelf -d tools/nodejs_api/build/kuzujs.node | grep NEEDED || true
          echo "=== Container glibc version ==="
          ldd --version | head -1

      - name: Rename prebuilt binary
        run: |
          mkdir -p tools/nodejs_api/prebuilt
          cp tools/nodejs_api/build/kuzujs.node tools/nodejs_api/prebuilt/kuzujs-linux-arm64.node

      - uses: actions/upload-artifact@v4
        with:
          name: nodejs-linux-arm64
          path: tools/nodejs_api/prebuilt/kuzujs-linux-arm64.node

  build-nodejs-mac-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node.js API dependencies
        working-directory: tools/nodejs_api
        run: npm install --include=dev

      - name: Build Node.js addon
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: make nodejs NUM_THREADS=$(sysctl -n hw.ncpu)

      - name: Rename prebuilt binary
        run: |
          mkdir -p tools/nodejs_api/prebuilt
          cp tools/nodejs_api/build/kuzujs.node tools/nodejs_api/prebuilt/kuzujs-darwin-arm64.node

      - uses: actions/upload-artifact@v4
        with:
          name: nodejs-darwin-arm64
          path: tools/nodejs_api/prebuilt/kuzujs-darwin-arm64.node

  publish-npm:
    needs: [build-nodejs-linux-x86, build-nodejs-linux-arm64, build-nodejs-mac-arm64]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@vela-engineering"

      - name: Download all prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          path: prebuilt-artifacts

      - name: Package Node.js addon
        working-directory: tools/nodejs_api
        run: |
          mkdir -p prebuilt
          cp ../../prebuilt-artifacts/nodejs-linux-x64/kuzujs-linux-x64.node prebuilt/
          cp ../../prebuilt-artifacts/nodejs-linux-arm64/kuzujs-linux-arm64.node prebuilt/
          cp ../../prebuilt-artifacts/nodejs-darwin-arm64/kuzujs-darwin-arm64.node prebuilt/
          node package.js
          tar -xzf kuzu-source.tar.gz

      - name: Set unique version and publish
        working-directory: tools/nodejs_api/package
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json')).version)")
          npm version "${VERSION}-vela.${SHA}" --no-git-tag-version
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────
  # .NET / C# native wrapper (libkuzunet)
  # ──────────────────────────────────────────────────
  build-dotnet-linux-x86:
    runs-on: ubuntu-24.04
    container: mcr.microsoft.com/dotnet/sdk:8.0-bookworm-slim
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: apt-get update && apt-get install -y cmake ninja-build g++ make python3 swig

      - name: Build kuzu + kuzunet
        env:
          LDFLAGS: "-static-libgcc -static-libstdc++"
        run: |
          export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          unset LD_LIBRARY_PATH LIBRARY_PATH CPATH C_INCLUDE_PATH CPLUS_INCLUDE_PATH PKG_CONFIG_PATH CC CXX
          make dotnet NUM_THREADS=$(nproc) EXTRA_CMAKE_FLAGS="-DDOTNET_REGENERATE_SWIG=ON -DCMAKE_SHARED_LINKER_FLAGS='-static-libgcc -static-libstdc++'"

      - name: Collect native binaries
        run: |
          mkdir -p dotnet-native/linux-x64
          cp build/release/tools/dotnet_api/libkuzunet.so dotnet-native/linux-x64/
          cp build/release/src/libkuzu.so dotnet-native/linux-x64/

      - uses: actions/upload-artifact@v4
        with:
          name: dotnet-linux-x64
          path: dotnet-native/linux-x64/

  build-dotnet-linux-arm64:
    runs-on: ubuntu-24.04-arm
    container: mcr.microsoft.com/dotnet/sdk:8.0-bookworm-slim
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: apt-get update && apt-get install -y cmake ninja-build g++ make python3 swig

      - name: Build kuzu + kuzunet
        env:
          LDFLAGS: "-static-libgcc -static-libstdc++"
        run: |
          export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          unset LD_LIBRARY_PATH LIBRARY_PATH CPATH C_INCLUDE_PATH CPLUS_INCLUDE_PATH PKG_CONFIG_PATH CC CXX
          make dotnet NUM_THREADS=$(nproc) EXTRA_CMAKE_FLAGS="-DDOTNET_REGENERATE_SWIG=ON -DCMAKE_SHARED_LINKER_FLAGS='-static-libgcc -static-libstdc++'"

      - name: Collect native binaries
        run: |
          mkdir -p dotnet-native/linux-arm64
          cp build/release/tools/dotnet_api/libkuzunet.so dotnet-native/linux-arm64/
          cp build/release/src/libkuzu.so dotnet-native/linux-arm64/

      - uses: actions/upload-artifact@v4
        with:
          name: dotnet-linux-arm64
          path: dotnet-native/linux-arm64/

  build-dotnet-mac-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install SWIG
        run: brew install swig

      - name: Build kuzu + kuzunet
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: make dotnet NUM_THREADS=$(sysctl -n hw.ncpu) EXTRA_CMAKE_FLAGS="-DDOTNET_REGENERATE_SWIG=ON"

      - name: Collect native binaries
        run: |
          mkdir -p dotnet-native/osx-arm64
          cp build/release/tools/dotnet_api/libkuzunet.dylib dotnet-native/osx-arm64/
          cp build/release/src/libkuzu.dylib dotnet-native/osx-arm64/

      - uses: actions/upload-artifact@v4
        with:
          name: dotnet-osx-arm64
          path: dotnet-native/osx-arm64/

  publish-nuget:
    needs: [build-dotnet-linux-x86, build-dotnet-linux-arm64, build-dotnet-mac-arm64]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download all native binaries
        uses: actions/download-artifact@v4
        with:
          path: dotnet-artifacts

      - name: Assemble NuGet runtime directories
        working-directory: tools/dotnet_api/src/Kuzu.Net
        run: |
          mkdir -p runtimes/linux-x64/native runtimes/linux-arm64/native runtimes/osx-arm64/native
          cp ../../../../dotnet-artifacts/dotnet-linux-x64/* runtimes/linux-x64/native/
          cp ../../../../dotnet-artifacts/dotnet-linux-arm64/* runtimes/linux-arm64/native/
          cp ../../../../dotnet-artifacts/dotnet-osx-arm64/* runtimes/osx-arm64/native/
          echo "=== Native runtimes ==="
          find runtimes -type f | sort

      - name: Pack NuGet
        working-directory: tools/dotnet_api/src/Kuzu.Net
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          VERSION=$(grep -oP 'project\(Kuzu VERSION \K[0-9.]+' ../../../../CMakeLists.txt)
          dotnet pack -c Release -p:Version="${VERSION}-vela.${SHA}"

      - name: Publish to GitHub Packages
        working-directory: tools/dotnet_api/src/Kuzu.Net
        run: |
          dotnet nuget push bin/Release/*.nupkg \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate
        env:
          DOTNET_SYSTEM_NET_HTTP_USESOCKETSHTTPHANDLER: 0

      - uses: actions/upload-artifact@v4
        with:
          name: dotnet-nuget
          path: tools/dotnet_api/src/Kuzu.Net/bin/Release/*.nupkg

  # ──────────────────────────────────────────────────
  # GitHub Release
  # ──────────────────────────────────────────────────
  release:
    needs:
      - build-linux-x86-wheels
      - build-linux-arm64-wheels
      - build-mac-wheels
      - publish-npm
      - publish-nuget
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP 'project\(Kuzu VERSION \K[0-9.]+' CMakeLists.txt)
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=v${VERSION}-vela.${SHA}" >> $GITHUB_OUTPUT
          echo "name=Kuzu ${VERSION} (vela ${SHA})" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: wheels
          pattern: '*-wheels'
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          path: nodejs-binaries
          pattern: 'nodejs-*'
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          path: dotnet-packages
          pattern: 'dotnet-nuget'
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          files: |
            wheels/*.whl
            nodejs-binaries/*.node
            dotnet-packages/*.nupkg
          generate_release_notes: true
